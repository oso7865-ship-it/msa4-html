<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입</title>
  </head>
  <body>
    <form action="" method="get">
      <fieldset>
        <legend>사용자 정보</legend>

        <label for="account">아이디:</label>
        <input
          type="text"
          id="account"
          name="account"
          minlength="4"
          maxlength="10"
          placeholder="4~10자 제한"
          required
        />
        <br />
        <label for="email">이메일:</label>
        <input type="email" name="email" id="email" required />
        <br />
        <label for="password">비밀번호:</label>
        <input type="password" name="password" id="password" required />
        <br />
        <label for="password2">비밀번호 확인</label>
        <input type="password" name="password2" id="password2" required />
        <br />

        <label for="road">가입 경로</label>
        <select name="road" id="road">
          <option value="etc">기타</option>
          <option value="internet">인터넷</option>
        </select>
      </fieldset>

      <fieldset>
        <legend>수신 여부</legend>
        <input type="radio" name="call" id="callyes" />
        <label for="callyes">수신</label>
        <input type="radio" name="call" id="callno" />
        <label for="callno">거부</label>
      </fieldset>
      <button type="submit">가입하기</button>
      <button type="reset">초기화</button>
    </form>
  </body>
</html>
