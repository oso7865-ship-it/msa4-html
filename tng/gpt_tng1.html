<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 페이지</title>
  </head>
  <body>
    <h1>로그인 페이지</h1>
    <form action="" method="get">
      <label for="account">ID:</label>
      <input
        type="text"
        id="account"
        name="account"
        minlength="4"
        maxlength="8"
        placeholder="사용하실 아이디 4~8자리를 입력해주세요."
      />
      <br />
      <label for="password">PW:</label>
      <input
        type="password"
        name="password"
        id="password"
        placeholder="사용하실 비밀 번호를 입력해주세요."
      />
      <button type="submit">가입</button>
    </form>
  </body>
</html>
